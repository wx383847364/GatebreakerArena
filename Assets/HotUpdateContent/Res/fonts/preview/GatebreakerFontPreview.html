<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>Gatebreaker Font Preview</title>
  <style>
    @font-face {
      font-family: "Gatebreaker Fusion Pixel";
      src: url("../source/FusionPixel12-Proportional-zh_hans.otf");
    }
    @font-face {
      font-family: "Gatebreaker Press Start";
      src: url("../source/PressStart2P-Regular.ttf");
    }
    @font-face {
      font-family: "Gatebreaker Pixelify";
      src: url("../source/PixelifySans-wght.ttf");
    }
    @font-face {
      font-family: "Gatebreaker DotGothic";
      src: url("../source/DotGothic16-Regular.ttf");
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #05090a;
      color: #fff;
    }
    main {
      width: min(860px, 94vw);
      padding: 28px;
      border: 3px solid #f4f4f4;
      box-shadow: 0 0 0 3px #111, 0 0 0 6px #2b6dff;
      background: #020303;
    }
    .line {
      margin: 24px 0;
      text-align: center;
    }
    .title {
      font-family: "Gatebreaker Press Start", monospace;
      font-size: 30px;
      color: #ffd324;
    }
    .cn {
      font-family: "Gatebreaker Fusion Pixel", monospace;
      font-size: 34px;
    }
    .body {
      font-family: "Gatebreaker Pixelify", monospace;
      font-size: 36px;
      color: #bdefff;
    }
    .alt {
      font-family: "Gatebreaker DotGothic", monospace;
      font-size: 34px;
      color: #7dff74;
    }
  </style>
</head>
<body>
  <main>
    <div class="line title">BATTLE MODE</div>
    <div class="line cn">比分：0　阶段：进行中　弹药：1/5</div>
    <div class="line body">SCORE: 0　HIT: 0　TIME 01:00</div>
    <div class="line alt">比赛结束　房间号：AB12</div>
  </main>
</body>
</html>
